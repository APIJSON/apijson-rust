# Panda Base 多数据源配置示例
# 请根据实际环境修改连接信息

datasource:
  # MySQL 数据源配置
  - name: ds_mysql
    kind: mysql
    username: ${MYSQL_USER:-panda_user}
    password: ${MYSQL_PASSWORD:-panda123}
    url: "mysql://${MYSQL_USER:-panda_user}:${MYSQL_PASSWORD:-panda123}@${MYSQL_HOST:-localhost}:${MYSQL_PORT:-3306}"
    database: ["panda_db", "panda_db_1"]
    default: true
    
  # PostgreSQL 数据源配置
  - name: ds_pg
    kind: postgres
    username: ${POSTGRES_USER:-panda_user}
    password: ${POSTGRES_PASSWORD:-panda123}
    url: "postgres://${POSTGRES_USER:-panda_user}:${POSTGRES_PASSWORD:-panda123}@${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}"
    database: ["panda_db"]
    default: false
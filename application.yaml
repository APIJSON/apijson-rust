# Panda Base 多数据源配置示例
# 请根据实际环境修改连接信息

datasource:
  # MySQL 数据源配置
  - name: ds_mysql
    kind: mysql
    username: panda_user
    password: "panda123"
    url: "mysql://panda_user:panda123@localhost:3306"
    database: ["panda_db"]
    default: true
    
  # PostgreSQL 数据源配置
  - name: ds_pg
    kind: postgres
    username: panda_user
    password: "panda123"
    url: "postgres://panda_user:panda123@localhost:5432"
    database: ["panda_db"]
    default: false

# 注意事项：
# 1. 至少需要配置一个数据源
# 2. 必须有且仅有一个数据源设置为 default: true
# 3. 数据源名称必须唯一
# 4. 每个数据源的数据库列表不能为空
# 5. URL 格式：
#    - MySQL: mysql://username:password@host:port
#    - PostgreSQL: postgres://username:password@host:port
# 6. 如果 URL 中已包含用户名和密码，会优先使用 URL 中的信息